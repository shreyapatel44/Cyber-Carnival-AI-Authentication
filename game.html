<!DOCTYPE html>
<html>

<head>
    <title>FaceGuard AI</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        /* ================= BACKGROUND ================= */
        html,
        body {
            margin: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        .fullscreen {
            height: 100vh;
            background: url("SHINFIN.jpeg") no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        /* ================= NAVBAR ================= */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 60px;
            background: #0b0b0b;
            border-bottom: 2px solid #1c1c1c;
            position: fixed;
            width: 100%;
            z-index: 1000;
        }

        .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
        }

        .nav-btn a {
            background: #ffb400;
            padding: 10px 22px;
            border-radius: 25px;
            color: black;
            font-weight: bold;
            text-decoration: none;
        }

        /* ================= LEFT GAME BOX ================= */
        .left-box {
            width: 900px;
            height: 500px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            position: absolute;
            top: 55%;
            left: 50px;
            transform: translateY(-50%);
            padding: 20px;
            border-radius: 20px;
        }

        /* ================= GAME UI ================= */
        input {
            padding: 8px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 8px 15px;
            border-radius: 8px;
            border: none;
            background: #00e6e6;
            cursor: pointer;
            margin: 10px;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        .middle-row {
            display: flex;
            align-items: center;
            gap: 30px;
            margin: 15px 0;
        }

        .side-option {
            width: 150px;
            padding: 12px;
            border: 2px solid white;
            border-radius: 12px;
            text-align: center;
        }

        .selected {
            background: #00ffcc;
            color: black;
            font-weight: bold;
        }

        video {
            border-radius: 15px;
            border: 3px solid #00ffff;
        }

        /* ================= TYPING TEXT ================= */
        .fline {
            position: absolute;
            top: 120px;
            left: 50px;
        }

        .h2 {
            font-size: 24px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 4px solid #ff4b5c;
            width: 0;
            animation: typing 4s steps(50, end) forwards,
                blink 0.7s infinite;
        }

        @keyframes typing {
            from {
                width: 0;
            }

            to {
                width: 100%;
            }
        }

        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }

        /* ================= BUBBLES ================= */
        .bubbles span {
            position: absolute;
            bottom: -50px;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: rise 12s infinite;
        }

        @keyframes rise {
            0% {
                transform: translateY(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-800px);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="fullscreen">

        <nav class="navbar">
            <div class="logo">🎮 AI Authentication Challenge</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Games</a></li>
                <li><a href="#">Blog</a></li>
            </ul>
            <div class="nav-btn">
                <a href="#">Login / Register</a>
            </div>
        </nav>

        <div class="fline">
            <h2 class="h2">Welcome to FaceGuard AI — Secure Your World 😄</h2>
        </div>

        <div class="left-box">

            <h3>Cyber DNA Face Login</h3>

            <input id="username" placeholder="Enter Username">
            <button onclick="verifyFace()">Verify Face</button>

            <h4 id="statusText"></h4>
            <h4 id="questionText"></h4>

            <div class="game-wrapper">

                <div id="option-up" class="side-option">Option 1</div>

                <div class="middle-row">
                    <div id="option-left" class="side-option">Option 3</div>
                    <video id="video" width="350" autoplay></video>
                    <div id="option-right" class="side-option">Option 4</div>
                </div>

                <div id="option-down" class="side-option">Option 2</div>

            </div>

        </div>

        <div class="bubbles">
            <span style="left:20%; animation-delay:0s;"></span>
            <span style="left:40%; animation-delay:2s;"></span>
            <span style="left:60%; animation-delay:4s;"></span>
            <span style="left:80%; animation-delay:6s;"></span>
        </div>

    </div>

</body>

</html>
